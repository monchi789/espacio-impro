<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 20px auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .header {
            background: #622f88;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .header img {
            max-width: 150px;
            height: auto;
            margin-bottom: 15px;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            color: #ffffff;
        }
        .content {
            padding: 30px;
            color: #333;
        }
        .alert {
            background-color: #fdd70f;
            border: 2px solid #e03d8e;
            border-radius: 4px;
            padding: 15px;
            margin: 20px 0;
            color: #333;
            font-weight: 600;
        }
        .info-box {
            background-color: #f8f9fa;
            border: 2px solid #19b2c0;
            border-radius: 4px;
            padding: 20px;
            margin: 20px 0;
        }
        .info-box strong {
            color: #622f88;
            display: block;
            margin-top: 10px;
        }
        .info-box strong:first-child {
            margin-top: 0;
        }
        .info-box a {
            color: #e03d8e;
            text-decoration: none;
            font-weight: 600;
        }
        .info-box a:hover {
            text-decoration: underline;
        }
        .message-content {
            background-color: #f9f9f9;
            border-left: 4px solid #19b2c0;
            padding: 15px 20px;
            margin: 20px 0;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
        }
        .footer {
            background-color: #622f88;
            padding: 20px;
            text-align: center;
            color: #ffffff;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="cid:logo" alt="Logo Espacio Impro Cusco">
            <h1>Nuevo Mensaje de Contacto</h1>
        </div>
        <div class="content">
            <div class="alert">
                <strong>Nuevo mensaje recibido en el formulario de contacto</strong>
            </div>
            
            <div class="info-box">
                <strong>Nombre:</strong> {{ nombre }}
                <strong>Email:</strong> <a href="mailto:{{ email }}">{{ email }}</a>
            </div>
            
            <h3>Mensaje:</h3>
            <div class="message-content">{{ mensaje }}</div>
            
            <p style="margin-top: 30px; color: #666; font-size: 14px;">
                Puedes responder directamente a este correo o contactar al remitente en {{ email }}
            </p>
        </div>
        <div class="footer">
            <p>© 2025 Espacio Impro Cusco - Sistema de Contacto</p>
        </div>
    </div>
</body>
</html>
</body>
</html>
