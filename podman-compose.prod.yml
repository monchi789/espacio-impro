version: '3.8'

# Compose de PRODUCCIÓN — VPS solo hace pull de imágenes pre-construidas en GHCR.
# No contiene `build:` para evitar consumo de RAM/CPU en el VPS.
# Imágenes generadas por .github/workflows/build-and-push.yml

services:
  impronakuy-api:
    image: ghcr.io/monchi789/impronakuy-api:${IMAGE_TAG:-latest}
    container_name: impronakuy-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ENVIRONMENT=${ENVIRONMENT}
    volumes:
      - ./impronakuy-backend/data:/app/data
    networks:
      - espacio-impro-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/live-state')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  espacio-impro-web:
    image: ghcr.io/monchi789/espacio-impro-web:${IMAGE_TAG:-latest}
    container_name: espacio-impro-web
    restart: unless-stopped
    ports:
      - "4321:80"
    networks:
      - espacio-impro-network
    depends_on:
      - impronakuy-api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  espacio-impro-network:
    driver: bridge
