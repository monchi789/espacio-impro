name: Deploy to VPS (espacio-impro)

on:
  workflow_run:
    workflows: ["Build and Push Images (espacio-impro)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to VPS (pull pre-built images)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            COMPOSE_FILE=podman-compose.prod.yml

            echo "🔄 Entrando al directorio del proyecto"
            cd ~/espacio-impro

            echo "📥 Haciendo pull de la rama main (solo manifests/compose)"
            git pull origin main --no-rebase

            echo "⬇️  Pull de imágenes públicas desde GHCR"
            podman-compose -f "$COMPOSE_FILE" pull

            echo "🛑 Deteniendo servicios anteriores"
            podman-compose -f "$COMPOSE_FILE" down --remove-orphans || true

            echo "🚀 Levantando servicios con imágenes nuevas"
            podman-compose -f "$COMPOSE_FILE" up -d --force-recreate --remove-orphans

            echo "🧹 Limpiando imágenes dangling (<none>)"
            podman images -f "dangling=true" -q | xargs -r podman rmi -f || true

            echo "✅ Despliegue finalizado correctamente"