version: '3.8'

services:
  # Backend API — Impronakuy 2026 (FastAPI + SQLite + WebSockets)
  impronakuy-api:
    build:
      context: ./impronakuy-backend
      dockerfile: Dockerfile
    container_name: impronakuy-api
    restart: unless-stopped
    ports:
      # HOST 8000 -> CONTAINER 8000
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ENVIRONMENT=${ENVIRONMENT}
    volumes:
      # Persistencia de la base de datos SQLite
      - ./impronakuy-backend/data:/app/data
    networks:
      - espacio-impro-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/live-state')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Astro (landing + dashboard admin)
  espacio-impro-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - PUBLIC_API_URL=${PUBLIC_API_URL}
    container_name: espacio-impro-web
    restart: unless-stopped
    ports:
      # HOST 4321 -> CONTAINER 80
      - "4321:80"
    networks:
      - espacio-impro-network
    depends_on:
      - impronakuy-api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  espacio-impro-network:
    driver: bridge
