version: '3.8'

services:
  # Backend API
  espacio-impro-api:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: espacio-impro-api
    restart: unless-stopped
    ports:
      # Mapeo: Puerto 8001 del HOST -> Puerto 8000 del CONTENEDOR
      - "8001:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_EMAIL=${SMTP_EMAIL}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
    volumes:
      - ./backend/data:/app/data
    networks:
      - espacio-impro-network
    # CAMBIO: Healthcheck sincronizado con el Dockerfile (usando urllib)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Astro
  espacio-impro-web:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: espacio-impro-web
    ports:
      # Mapeo: Puerto 4321 del HOST -> Puerto 80 del CONTENEDOR
      - "4321:80" 
    restart: unless-stopped
    networks:
      - espacio-impro-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  espacio-impro-network:
    driver: bridge