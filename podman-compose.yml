version: '3.8'

services:
  # Backend API
  espacio-impro-api:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: espacio-impro-api
    restart: unless-stopped
    ports:
      - "8000:8000" # Esto está bien, coincide con el Nginx del API
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_EMAIL=${SMTP_EMAIL}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
    volumes:
      - ./backend/data:/app/data
    networks:
      - espacio-impro-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Astro
  espacio-impro-web:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: espacio-impro-web
    ports:
      - "4321:80"  # <--- CAMBIO IMPORTANTE: Puerto 4321 externo, 80 interno
    restart: unless-stopped
    networks:
      - espacio-impro-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  espacio-impro-network:
    driver: bridge