server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Astro genera archivos .html — try_files maneja rutas con/sin trailing slash
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Assets versionados → cache largo + immutable
    location ~* \.(js|css|woff2?|ttf|eot|otf|png|jpe?g|gif|webp|avif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML → no cache (para que cambios de deploy se reflejen al instante)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Página de error
    error_page 404 /404.html;

    # Headers de seguridad básicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
